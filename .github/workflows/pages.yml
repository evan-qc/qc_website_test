name: Deploy Jekyll site to Pages

on:
  # Deploy on every push to the default branch
  push:
    branches: ["main"]
  # Allow manual deploys from the Actions tab
  workflow_dispatch:

# Least-privilege permissions needed to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time, but never cancel an in-progress one -
# queued merges deploy in order instead of cancelling each other.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
